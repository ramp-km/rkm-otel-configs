# Example Secret for PostgreSQL scraping (EDOT gateway). Used by edot-postgresql-receiver-values.yaml.
# Apply before Helm when using the postgresql overlay:
#   kubectl apply -f postgresql-otel-ram-eks-secret.example.yaml -n opentelemetry-operator-system
#
# DB user needs at least: pg_monitor (PG10+) or SELECT on pg_stat_* views used by the receiver.
# See: https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/postgresqlreceiver
#
# For AWS RDS with TLS, set tls.insecure: false on the receiver in edot-postgresql-receiver-values.yaml and add CA as needed.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-otel-ram-eks
  namespace: opentelemetry-operator-system
type: Opaque
stringData:
  # host:port reachable from gateway Pods (e.g. in-cluster Service or RDS endpoint)
  endpoint: "postgresql.database.svc.cluster.local:5433"
  username: "postgresql"
  password: "postgresql"
