# PostgreSQL receiver overlay for opentelemetry-kube-stack when the BASE values are
# Elastic managed_otlp (e.g. elastic-agent .../managed_otlp/values.yaml).
#
# Gateway metrics pipeline must stay aligned with that chart:
#   processors: []  and  exporters: [debug, otlp/ingest_metrics_traces]
#
# Apply AFTER creating Secret postgresql-otel-ram-eks (see commands in edot/README.md).
#
# Note: chart `extraEnvs` is global — merged into every collector Pod; only gateway
# uses these vars in config.

extraEnvs:
  - name: POSTGRESQL_ENDPOINT
    valueFrom:
      secretKeyRef:
        name: postgresql-otel-ram-eks
        key: endpoint
  - name: POSTGRESQL_USERNAME
    valueFrom:
      secretKeyRef:
        name: postgresql-otel-ram-eks
        key: username
  - name: POSTGRESQL_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgresql-otel-ram-eks
        key: password

collectors:
  gateway:
    config:
      receivers:
        postgresql:
          endpoint: ${env:POSTGRESQL_ENDPOINT}
          username: ${env:POSTGRESQL_USERNAME}
          password: ${env:POSTGRESQL_PASSWORD}
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.database.locks:
              enabled: true
            postgresql.deadlocks:
              enabled: true
            postgresql.sequential_scans:
              enabled: true
            postgresql.temp_files:
              enabled: true
            postgresql.temp.io:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_updated:
              enabled: true
            postgresql.wal.delay:
              enabled: true
            postgresql.function.calls:
              enabled: true
          events:
            db.server.query_sample:
              enabled: true
            db.server.top_query:
              enabled: true
          query_sample_collection:
            max_rows_per_query: 100
          top_query_collection:
            max_rows_per_query: 100
            top_n_query: 200
            max_explain_each_interval: 1000
            query_plan_cache_size: 1000
            query_plan_cache_ttl: 1h
          collection_interval: 60s
          tls:
            insecure: true
      service:
        pipelines:
          metrics:
            receivers: [otlp, postgresql]
            processors: []
            exporters: [debug, otlp/ingest_metrics_traces]
          logs/postgresql:
            receivers: [otlp, postgresql]
            processors: []
            exporters: [debug, otlp/ingest_logs]
